<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Buku - Lentera Publika</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: #ffffff; /* Putih bersih agar elegan */
    color: #334155;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background-color: #1e3a8a;
    padding: 12px 5%;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 999;
  }

  .header-logo { font-weight: 700; font-size: 1.1rem; }
  .btn-back {
    color: white; text-decoration: none; font-size: 14px;
    padding: 8px 16px; border-radius: 50px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; gap: 8px;
  }

  /* CONTAINER UTAMA */
  main {
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 20px;
  }

  .detail-container {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 40px;
    align-items: start;
  }

  /* COVER BUKU */
  .book-cover-large {
    width: 100%;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    object-fit: cover;
  }

  /* INFO BUKU */
  .book-info h1 {
    font-size: 2rem; /* Ukuran besar di laptop */
    color: #1e3a8a;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .author {
    font-size: 1.1rem;
    color: #64748b;
    margin-bottom: 30px;
  }

  /* GRID BIBLIOGRAFI */
  h3 {
    font-size: 1.2rem;
    color: #1e3a8a;
    margin: 30px 0 15px 0;
    border-bottom: 2px solid #f1f5f9;
    padding-bottom: 8px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 15px;
  }

  .info-label {
    font-weight: 700;
    font-size: 0.85rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .info-value {
    font-size: 1rem;
    color: #334155;
    word-break: break-word;
  }

  /* TABEL */
  .table-wrapper {
    overflow-x: auto;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    margin-top: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 500px;
  }

  th, td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #e2e8f0;
    font-size: 0.9rem;
  }

  th { background: #f8fafc; color: #1e3a8a; font-weight: 600; }

  /* SINOPSIS (Fix Warna & Font) */
  .synopsis-text {
    font-size: 1rem;
    color: #475569;
    line-height: 1.8;
    text-align: justify;
  }

  /* FOOTER */
  footer {
    background: #1e3a8a;
    color: #bfdbfe;
    text-align: center;
    padding: 40px 20px;
    margin-top: 50px;
  }

  /* RESPONSIVE HP */
  @media (max-width: 768px) {
    main { margin: 15px auto; padding: 0 15px; }

    .detail-container {
      grid-template-columns: 1fr; /* Jadi satu kolom di HP */
      gap: 25px;
    }

    .book-cover-large {
      max-width: 200px; /* Cover mengecil di HP */
      margin: 0 auto;
      display: block;
    }

    .book-info h1 {
      font-size: 1.4rem; /* Font judul mengecil di HP */
      text-align: center;
    }

    .author {
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 20px;
    }

    .info-grid {
      grid-template-columns: 1fr; /* Label & Value tumpuk vertikal */
      gap: 5px;
    }

    .info-label { margin-top: 10px; }
    
    h3 { font-size: 1.1rem; }
    
    .synopsis-text { font-size: 0.95rem; }
  }
</style>
</head>

<body>
  <div class="intro"></div>

  <header>
    <a href="katalog.html" class="btn-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Kembali
    </a>
    <div class="header-logo">Lentera Publika</div>
  </header>

  <main id="detail-content">
    <div style="text-align:center; padding:100px; color:#64748b;">Memuat informasi buku...</div>
  </main>

  <footer>
    <p>© 2026 Perpustakaan Lentera Publika</p>
    <p style="margin-top: 5px; font-weight: 300; opacity: 0.8;">Terangi Dunia dengan Ilmu</p>
  </footer>

  <script src="script-detail.js"></script>
</body>
</html>

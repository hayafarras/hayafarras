<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Kegiatan - Lentera Publika</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Poppins', sans-serif; 
      background: #ffffff; 
      color: #334155; 
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #1e3a8a; padding: 15px 5%; color: white;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 999;
    }

    .btn-back {
      color: white; text-decoration: none; font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1);
      padding: 8px 16px; border-radius: 50px; transition: 0.3s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.2); }

    main { flex: 1; max-width: 900px; margin: 30px auto; padding: 0 20px; width: 100%; }

    .hero-image {
      width: 100%; height: 400px; object-fit: cover;
      border-radius: 20px; margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .event-title { font-size: 2rem; color: #1e3a8a; font-weight: 700; margin-bottom: 15px; line-height: 1.2; }
    
    .event-meta { 
      display: flex; flex-wrap: wrap; gap: 20px; 
      margin-bottom: 30px; padding-bottom: 20px; 
      border-bottom: 1px solid #f1f5f9; 
    }
    .meta-item { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; color: #64748b; }
    .meta-item i { color: #2563eb; width: 16px; }

    .description-container h3 { font-size: 1.2rem; color: #1e3a8a; margin-bottom: 15px; }
    .description-text { text-align: justify; white-space: pre-line; color: #475569; font-size: 1rem; }

    .registration-box {
      margin-top: 40px; padding: 30px; background: #f8fafc;
      border-radius: 20px; border: 1px solid #e2e8f0; text-align: center;
    }

    .btn-register {
      display: inline-block; padding: 15px 40px; background: #1e3a8a;
      color: white; text-decoration: none; border-radius: 12px;
      font-weight: 700; font-size: 1rem; transition: 0.3s;
      box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2);
    }
    .btn-register:hover { background: #2563eb; transform: translateY(-3px); }
    .btn-register.disabled { background: #e2e8f0; color: #94a3b8; pointer-events: none; box-shadow: none; }

    footer { background: #1e3a8a; color: #bfdbfe; text-align: center; padding: 40px 20px; font-size: 14px; }

    @media (max-width: 768px) {
      .hero-image { height: 250px; border-radius: 15px; }
      .event-title { font-size: 1.5rem; text-align: center; }
      .event-meta { justify-content: center; gap: 15px; }
      .meta-item { font-size: 0.85rem; }
      .description-text { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <header> </header>

  <main id="event-detail-content">
    <div style="text-align: center; padding: 100px; color: #64748b;">
      <i class="fas fa-spinner fa-spin"></i> Memuat detail kegiatan...
    </div>
  </main>

  <footer> </footer>

  <script src="script-detail-kegiatan.js"></script>
  <script src="script.js"></script>

</body>
</html>
